endpoints:
  /checkout/retry:
    features:
      - checkout_retry_workflow

features:
  checkout_retry_workflow:
    services:
      - checkout-web
      - checkout-worker
    workflow: periodic_checkout_retry
    description: Periodic checkout retry workflow

operator_hints:
  checkout_retry_workflow:
    recently_shipped: true
    scheduled_workflow: true
    note: Recently shipped scheduled checkout retry workflow
